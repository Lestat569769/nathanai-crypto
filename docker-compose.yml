services:

  # ── Neo4j — Token/Wallet Graph Database ──────────────────────────────────
  neo4j:
    image: neo4j:5.18
    container_name: nathanai-crypto-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Neo4j Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-crypto123}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - crypto_neo4j_data:/data
      - crypto_neo4j_logs:/logs
      - crypto_neo4j_import:/import
      - crypto_neo4j_plugins:/plugins
    networks:
      - crypto-network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-crypto123}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Collector — pump.fun WebSocket + rugcheck + Neo4j ingest ─────────────
  collector:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: nathanai-crypto-collector
    restart: unless-stopped
    command: python main.py --mode collect
    env_file: .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - ./:/app
      - crypto_logs:/app/logs
    networks:
      - crypto-network
    depends_on:
      neo4j:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Validator — LLM decision engine (qwen3:8b + qwen3:4b gate) ───────────
  validator:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: nathanai-crypto-validator
    restart: unless-stopped
    command: python main.py --mode validate
    env_file: .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - PRIMARY_MODEL=${PRIMARY_MODEL:-qwen3:8b}
      - GATE_MODEL=${GATE_MODEL:-qwen3:4b}
    volumes:
      - ./:/app
      - crypto_logs:/app/logs
    networks:
      - crypto-network
    depends_on:
      neo4j:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Paper Trader — logs decisions, NO real execution ─────────────────────
  paper-trader:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: nathanai-crypto-paper
    restart: unless-stopped
    command: python main.py --mode paper
    env_file: .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - PAPER_TRADING=true
    volumes:
      - ./:/app
      - crypto_logs:/app/logs
    networks:
      - crypto-network
    depends_on:
      - collector
      - validator
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - paper   # only starts with: docker compose --profile paper up

  # ── Dashboard — Rich terminal UI streamed via web ─────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: nathanai-crypto-dashboard
    restart: unless-stopped
    command: python monitor/dashboard.py
    env_file: .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
    ports:
      - "8765:8765"   # WebSocket stream for dashboard UI
    volumes:
      - ./:/app
      - crypto_logs:/app/logs
    networks:
      - crypto-network
    depends_on:
      neo4j:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  crypto_neo4j_data:
  crypto_neo4j_logs:
  crypto_neo4j_import:
  crypto_neo4j_plugins:
  crypto_logs:

networks:
  crypto-network:
    driver: bridge
